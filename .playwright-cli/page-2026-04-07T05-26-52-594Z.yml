              - paragraph [ref=e60]: 한 학교에 전두광 학생회장이 있었어요. 이 학생회장은 학생들이 투표로 뽑은 게 아니라, 선생님들과 학생회 임원 몇 명이 모여 정해서 회장이 되었어요. 그래서 많은 학생들은 “우리 의견은 왜 묻지 않아요?” 하며 불만을 느꼈어요.
              - paragraph [ref=e61]: 전두광 학생회장은 학생들의 목소리를 듣기보다는 자신의 말만 따르도록 했어요. 어느 날, 한 학생이 “학생회장이 약속을 안 지켰어요.”라고 학교 게시판에 글을 올렸는데, 학생회장이 “이런 글은 올리면 안 돼.” 하며 글을 지워 버렸어요.
              - paragraph [ref=e62]: 새 회장을 뽑는 선거가 열린다고 했지만, 전두광 회장은 “후보는 내가 고를게.”라고 하며 자기 친구만 후보로 내세웠어요. 학생들은 “이건 선거가 아니야. 다 짜고 하는 거잖아.” 하며 더 답답했어요.
              - paragraph [ref=e63]: 결국 몇몇 학생들이 운동장에서 모여 이야기라도 하자고 했어요. 그런데 학생회 임원들이 와서 “모이면 안 돼! 다 흩어져!” 하며 학생들을 쫓아냈어요. 자유롭게 말할 수도, 모일 수도 없는 상황이었어요.
