                - paragraph [ref=e31]: 한 학교에 전두광 학생회장이 있었어요. 이 학생회장은 학생들이 투표로 뽑은 게 아니라, 선생님들과 학생회 임원 몇 명이 모여 정해서 회장이 되었어요. 그래서 많은 학생들은 “우리 의견은 왜 묻지 않아요?” 하며 불만을 느꼈어요.
                - paragraph [ref=e32]: 전두광 학생회장은 학생들의 목소리를 듣기보다는 자신의 말만 따르도록 했어요. 어느 날, 한 학생이 “학생회장이 약속을 안 지켰어요.”라고 학교 게시판에 글을 올렸는데, 학생회장이 “이런 글은 올리면 안 돼.” 하며 글을 지워 버렸어요.
                - paragraph [ref=e33]: 새 회장을 뽑는 선거가 열린다고 했지만, 전두광 회장은 “후보는 내가 고를게.”라고 하며 자기 친구만 후보로 내세웠어요. 학생들은 “이건 선거가 아니야. 다 짜고 하는 거잖아.” 하며 더 답답했어요.
                - paragraph [ref=e34]: 결국 몇몇 학생들이 운동장에서 모여 이야기라도 하자고 했어요. 그런데 학생회 임원들이 와서 “모이면 안 돼! 다 흩어져!” 하며 학생들을 쫓아냈어요. 자유롭게 말할 수도, 모일 수도 없는 상황이었어요.
                - paragraph [ref=e35]: 그때 박종선 학생이 “학생회가 잘못한 걸 밝혀야 해요.” 하며 진실을 알려고 했는데, 그 일로 심하게 혼나고 다치는 일이 생겼어요. 학교는 이 사실을 숨기려 했지만, 학생들은 진실을 알게 되었어요.
                - paragraph [ref=e36]: 이 일로 마음이 아팠던 친구 이하늘 학생은 “이건 정말 불공평해요. 바꿔야 해요!” 하며 운동장에 나가 목소리를 냈어요. 그런데 시위 도중 학생회 임원이 던진 물병에 맞아 다치는 일이 일어났어요. 이 사건으로 학교 전체가 충격을 받았어요.
                - paragraph [ref=e37]: 그제야 많은 학생들이 용기 내어 외쳤어요. “우리도 직접 투표로 학생회장을 뽑고 싶어요!” 결국 학교는 학생들의 뜻을 받아들여 모든 학생이 학생회장을 직접 투표로 뽑는 직선제를 시작했어요.
